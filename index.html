<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BarakaLink - Find Ustaz</title>

  <!-- Telegram -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="mainView">

  <!-- 🔝 TOP BAR -->
  <div class="top-bar">
    <div class="top-left">
      <h2 class="app-name">BarakaLink</h2>
      <p class="location">📍 Bole ▼</p>
    </div>

    <div class="top-icons">
      <span class="icon theme-toggle">🌙</span>
      <span class="icon">👤</span>
    </div>
  </div>

  <!-- 🌟 HERO -->
  <div class="hero">
    <div class="hero-badge">🕌 Find Trusted Quran Teachers Near You</div>

    <h1 class="hero-title">
      Connecting You with Qualified Quran Ustaz Easily.
    </h1>

    <p class="hero-subtitle">
      Find trusted, nearby Quran teachers for Tajweed, Hifz, and more — quickly and safely.
    </p>

    <button class="hero-btn" onclick="scrollToList()">
      Find Ustaz ↓
    </button>
  </div>

  <!-- 🔍 SEARCH -->
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search Tajweed, Hifz, Female ustaz...">
  </div>

  <!-- ⚡ FILTERS -->
  <div class="filters">
    <button class="filter-btn active">All</button>
    <button class="filter-btn">Female</button>
    <button class="filter-btn">Male</button>
    <button class="filter-btn">Hifz</button>
    <button class="filter-btn">Tajweed</button>
  </div>

  <!-- 🔥 POPULAR -->
  <div class="section">
    <h3>🔥 Popular Near You</h3>
    <div class="horizontal-scroll" id="popularList"></div>
  </div>

  <!-- 🧑‍🏫 USTAZ LIST (DYNAMIC) -->
  <div class="ustaz-list" id="ustazList"></div>

</div>

<!-- 🔐 AUTH MODAL -->
<div class="modal" id="authModal">
  <div class="modal-content">
    <h3>Sign up to contact</h3>
    <p>Create an account to chat with this ustaz</p>
    <button class="chat-btn">Sign up as Parent</button>
    <button class="view-btn" id="closeModal">Cancel</button>
  </div>
</div>

<!-- 🔻 NAV -->
<div class="bottom-nav">
  <div class="nav-item active">🏠</div>
  <div class="nav-item">📚</div>
  <div class="nav-item">💬</div>
  <div class="nav-item">👤</div>
</div>

<script src="script.js"></script>
</body>
</html>
