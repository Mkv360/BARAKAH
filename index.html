<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BarakaLink - Find Ustaz</title>

  <!-- Telegram -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="mainView">

  <!-- 🔝 TOP BAR -->
  <div class="top-bar">
    <div class="top-left">
      <h2 class="app-name">BarakaLink</h2>
      <p class="location">📍 Bole ▼</p>
    </div>

    <div class="top-icons">
      <span class="icon">🌙</span>
      <span class="icon">👤</span>
    </div>
  </div>

  <!-- 🔍 SEARCH -->
  <div class="search-bar">
    <input type="text" placeholder="Search Tajweed, Hifz, Female ustaz...">
  </div>

  <!-- ⚡ FILTERS -->
  <div class="filters">
    <button class="filter-btn active">Nearby</button>
    <button class="filter-btn">Female</button>
    <button class="filter-btn">Male</button>
    <button class="filter-btn">Hifz</button>
    <button class="filter-btn">Tajweed</button>
  </div>

  <!-- 🔥 POPULAR -->
  <div class="section">
    <h3>🔥 Popular Near You</h3>
    <div class="horizontal-scroll">

      <div class="small-card">
        <div class="avatar"></div>
        <p class="small-name">Ahmed</p>
        <p class="small-rating">⭐ 4.8</p>
      </div>

      <div class="small-card">
        <div class="avatar"></div>
        <p class="small-name">Fatima</p>
        <p class="small-rating">⭐ 4.9</p>
      </div>

    </div>
  </div>

  <!-- 🧑‍🏫 USTAZ LIST -->
  <div class="ustaz-list">

    <div class="ustaz-card">
      <div class="avatar"></div>

      <div class="ustaz-info">
        <div class="top-row">
          <h4 class="name">Ahmed Ali ✔️</h4>
          <span class="rating">⭐ 4.7</span>
        </div>

        <p class="subjects">Tajweed • Hifz</p>
        <p class="location-text">📍 Bole (1.2 km)</p>
        <p class="mosque">🕌 Anwar Mosque</p>

        <p class="status available">🟢 Available Today</p>

        <div class="actions">
          <button class="chat-btn">Chat</button>
          <button class="view-btn">View</button>
        </div>
      </div>
    </div>

  </div>

</div>

<!-- 🔐 AUTH MODAL -->
<div class="modal" id="authModal">
  <div class="modal-content">
    <h3>Sign up to contact</h3>
    <p>Create an account to chat with this ustaz</p>
    <button class="chat-btn">Sign up as Parent</button>
    <button class="view-btn" id="closeModal">Cancel</button>
  </div>
</div>

<!-- 🔻 FLOATING BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item active">🏠</div>
  <div class="nav-item">🧑‍🏫</div>
  <div class="nav-item">📥</div>
  <div class="nav-item">ℹ️</div>
  <div class="nav-item">💬</div>
</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
