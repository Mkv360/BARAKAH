<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BarakaLink - Find Ustaz</title>

  <!-- Telegram -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="mainView">

  <!-- ================= HEADER ================= -->
  <div class="top-bar">

    <div class="logo-area">
      <h2 class="app-name">Baraka<span class="green">Link</span></h2>
      <p class="tagline">Connect with Quran Teachers.</p>
    </div>

    <!-- THEME SWITCH (LIKE IMAGE) -->
    <div class="theme-switch">
      <span class="theme-btn active" id="darkModeBtn">🌙 Dark</span>
      <span class="theme-btn" id="lightModeBtn">☀️ Light</span>
    </div>

  </div>

  <!-- ================= LOCATION + SEARCH ================= -->
  <div class="top-controls">

    <!-- LOCATION -->
    <div class="location-box" id="locationBox">
      <i class="fa-solid fa-location-dot"></i>
      <span id="selectedLocation">Bole, Addis Ababa</span>
      <i class="fa-solid fa-chevron-down"></i>
    </div>

    <!-- SEARCH -->
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search ustaz or subject...">
    </div>

  </div>

  <!-- LOCATION DROPDOWN -->
  <div class="location-dropdown" id="locationDropdown">
    <div class="location-item" data-value="Bole">Bole</div>
    <div class="location-item" data-value="Yeka">Yeka</div>
    <div class="location-item" data-value="Kirkos">Kirkos</div>
    <div class="location-item" data-value="Kolfe">Kolfe</div>
  </div>

  <!-- ================= FILTERS ================= -->
  <div class="filters">
    <button class="filter-btn active">All</button>
    <button class="filter-btn">Male</button>
    <button class="filter-btn">Female</button>
    <button class="filter-btn">Hifz</button>
    <button class="filter-btn">Tajweed</button>
  </div>

  <!-- ================= POPULAR ================= -->
  <div class="section">

    <div class="section-header">
      <h3>Popular Near You</h3>
      <span class="see-all" id="seeAllBtn">See all</span>
    </div>

    <div class="popular-wrapper">

      <button class="scroll-btn left" id="scrollLeft">
        <i class="fa-solid fa-chevron-left"></i>
      </button>

      <div class="horizontal-scroll" id="popularList">
        <!-- JS -->
      </div>

      <button class="scroll-btn right" id="scrollRight">
        <i class="fa-solid fa-chevron-right"></i>
      </button>

    </div>

  </div>

  <!-- ================= USTAZ LIST ================= -->
  <div class="section">

    <div class="section-header">
      <h3>All Ustaz</h3>
    </div>

    <div class="ustaz-list" id="ustazList">
      <!-- JS -->
    </div>

  </div>

</div>

<!-- ================= MODAL ================= -->
<div class="modal" id="authModal">
  <div class="modal-content">
    <h3>Sign up to contact</h3>
    <p>Create an account to chat with this ustaz</p>
    <button class="chat-btn">Sign up</button>
    <button class="view-btn" id="closeModal">Cancel</button>
  </div>
</div>

<!-- ================= NAV ================= -->
<div class="bottom-nav">
  <div class="nav-item active"><i class="fa-solid fa-house"></i></div>
  <div class="nav-item"><i class="fa-solid fa-book-open"></i></div>
  <div class="nav-item"><i class="fa-solid fa-message"></i></div>
  <div class="nav-item"><i class="fa-solid fa-user"></i></div>
</div>

<script src="script.js"></script>

</body>
</html>
