<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BarakaLink</title>

  <!-- Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- TOP -->
  <div class="top-bar">
    <div class="logo">Baraka<span>Link</span></div>

    <div class="auth-buttons">
      <button class="login">Login</button>
      <button class="signup">Sign Up</button>
    </div>
  </div>

  <!-- LOCATION -->
  <div class="location">
    <i class="fa-solid fa-location-dot"></i>
    Bole, Addis Ababa
  </div>

  <!-- SEARCH -->
  <div class="search">
    <input type="text" id="searchInput" placeholder="Search ustaz or subject...">
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <div class="filter active">All</div>
    <div class="filter">Male</div>
    <div class="filter">Female</div>
    <div class="filter">Hifz</div>
    <div class="filter">Tajweed</div>
  </div>

  <!-- POPULAR -->
  <div class="section">
    <div class="section-header">
      <h3>Popular Near You</h3>
      <span class="see-all">See all</span>
    </div>

    <div class="popular" id="popularList"></div>
  </div>

  <!-- LIST -->
  <div class="section">
    <h3>All Ustaz</h3>
    <div id="ustazList"></div>
  </div>

</div>

<!-- NAV -->
<div class="nav">
  <i class="fa-solid fa-house active"></i>
  <i class="fa-solid fa-book-open"></i>
  <i class="fa-solid fa-message"></i>
  <i class="fa-solid fa-user"></i>
</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
